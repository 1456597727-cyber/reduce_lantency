<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>播放中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f1a;color:#fff;font-family:'Microsoft YaHei',sans-serif;}
.top{position:fixed;top:0;left:0;right:0;z-index:10;background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;gap:20px;font-size:0.9rem;border-bottom:1px solid rgba(255,255,255,0.06);}
.top a{color:#e94560;text-decoration:none;}
.cont{max-width:800px;margin:80px auto 0;padding:20px;}
.card{background:#1a1a2e;border-radius:12px;padding:28px;margin:16px 0;}
.card h2{font-size:1.1rem;margin-bottom:16px;}
pre{background:#000;padding:16px;border-radius:8px;font-size:0.82rem;overflow-x:auto;color:#0f9;word-break:break-all;white-space:pre-wrap;margin:12px 0;}
.btn{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem;font-weight:600;margin:4px;}
.btn-green{background:#0f9;color:#000;}
.copied{color:#0f9;font-size:0.85rem;display:none;}
ol li{padding:8px 0;color:#8892b0;line-height:1.8;}
ol li span{color:#fff;}
</style></head><body>
<div class="top"><span>▶ 播放页面</span><a href="/dashboard">← 返回</a></div>
<div class="cont">

<div class="card">
<h2>⚙ 首次使用（只需一次）</h2>
<ol>
<li>下载 ffplay：<a href="https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" style="color:#e94560;">ffmpeg-release-essentials.zip</a>（40MB）</li>
<li>解压到随便一个文件夹，比如 <code>C:\player\</code></li>
<li>进到 <code>bin</code> 文件夹，里面有 <code>ffplay.exe</code></li>
</ol>
</div>

<div class="card">
<h2>🔗 播放链接</h2>
<pre id="streamUrl" style="color:#8892b0;"></pre>
</div>

<div class="card">
<h2>▶ 打开方式</h2>
<p style="color:#8892b0;margin-bottom:12px;"><b>推荐</b>：用 <a href="https://potplayer.tv" style="color:#e94560;">PotPlayer</a>（免费）→ 右键 → 打开 → 粘贴链接，最简单</p>
<p style="color:#8892b0;margin-bottom:12px;">或者打开 <code>cmd</code>，cd 到 ffplay 解压目录的 bin 文件夹，运行：</p>
<pre id="ffplayCmd"></pre>
<button class="btn btn-green" onclick="copyCmd()">📋 复制命令</button>
<span class="copied" id="copiedMsg">✅ 已复制！</span>
</div>
</div>
<script>
(function(){
    var url = {{ stream_url | tojson }};
    // Full path command - works from any directory
    var cmd = '& "D:\\reduce_latency\\ffmpeg\\bin\\ffplay.exe" -fflags nobuffer -flags low_delay -framedrop -max_delay 0 -window_title LowLatency "' + url + '"';

    document.getElementById('ffplayCmd').textContent = cmd;
    document.getElementById('streamUrl').textContent = url;

    window.copyCmd = function(){
        navigator.clipboard.writeText(cmd).then(function(){
            var m = document.getElementById('copiedMsg');
            m.style.display = 'inline';
            setTimeout(function(){ m.style.display = 'none'; }, 3000);
        });
    };
})();
</script>
</body></html>
